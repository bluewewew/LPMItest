# 推送到 gh-pages 分支；仓库 Settings → Pages → Source 选 branch「gh-pages」/ folder「/ (root)」
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (仅发布页面所需文件)
        run: |
          mkdir -p dist
          cp index.html app.js styles.css personas.js dist/
          cp -r assets dist/
          touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
